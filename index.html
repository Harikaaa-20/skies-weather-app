<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Skies — Weather</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b0f1a;
      --surface: #111827;
      --border: #1f2937;
      --text: #f0f4ff;
      --muted: #6b7280;
      --accent: #60a5fa;
      --warm: #fbbf24;
      --cool: #93c5fd;
      --danger: #f87171;
    }

    body {
      font-family: 'DM Mono', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 3rem 1rem 5rem;
      position: relative;
      overflow-x: hidden;
    }

    /* Ambient background blobs */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.12;
      pointer-events: none;
    }
    body::before {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #3b82f6, transparent);
      top: -100px; left: -150px;
    }
    body::after {
      width: 400px; height: 400px;
      background: radial-gradient(circle, #8b5cf6, transparent);
      bottom: -80px; right: -100px;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
      animation: fadeDown 0.6s ease both;
    }

    header h1 {
      font-family: 'Instrument Serif', serif;
      font-size: clamp(2.5rem, 6vw, 4rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    header h1 em {
      font-style: italic;
      color: var(--accent);
    }

    header p {
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-top: 0.4rem;
    }

    .search-wrap {
      display: flex;
      gap: 0.5rem;
      width: 100%;
      max-width: 480px;
      margin-bottom: 2rem;
      animation: fadeDown 0.7s ease both;
    }

    input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
      padding: 0.75rem 1rem;
      border-radius: 6px;
      outline: none;
      transition: border-color 0.2s;
    }

    input::placeholder { color: var(--muted); }
    input:focus { border-color: var(--accent); }

    button {
      background: var(--accent);
      color: #0b0f1a;
      border: none;
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      padding: 0.75rem 1.2rem;
      border-radius: 6px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      white-space: nowrap;
    }

    button:hover { opacity: 0.85; transform: translateY(-1px); }
    button:active { transform: translateY(0); }
    button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    /* API key setup */
    .setup-box {
      width: 100%;
      max-width: 480px;
      background: var(--surface);
      border: 1px solid #2563eb44;
      border-radius: 10px;
      padding: 1.2rem 1.4rem;
      margin-bottom: 1.5rem;
      font-size: 0.75rem;
      color: var(--muted);
      line-height: 1.6;
      animation: fadeDown 0.65s ease both;
    }

    .setup-box strong { color: var(--accent); }
    .setup-box a { color: var(--accent); }

    /* Error */
    .error-box {
      width: 100%;
      max-width: 480px;
      background: #1f0a0a;
      border: 1px solid #7f1d1d;
      border-radius: 8px;
      padding: 0.9rem 1.2rem;
      font-size: 0.78rem;
      color: var(--danger);
      margin-bottom: 1.2rem;
      animation: fadeDown 0.3s ease both;
    }

    /* Main card */
    .card {
      width: 100%;
      max-width: 480px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      animation: fadeUp 0.5s ease both;
    }

    .card-hero {
      padding: 2rem 2rem 1.5rem;
      position: relative;
      border-bottom: 1px solid var(--border);
    }

    .city-name {
      font-family: 'Instrument Serif', serif;
      font-size: 2.4rem;
      font-weight: 400;
      line-height: 1;
    }

    .country {
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-top: 0.3rem;
    }

    .temp-row {
      display: flex;
      align-items: flex-end;
      gap: 1rem;
      margin-top: 1.4rem;
    }

    .temp-main {
      font-family: 'Instrument Serif', serif;
      font-size: 5rem;
      line-height: 1;
      color: var(--warm);
    }

    .temp-feels {
      font-size: 0.72rem;
      color: var(--muted);
      padding-bottom: 0.6rem;
    }

    .weather-icon {
      position: absolute;
      top: 1.5rem; right: 1.8rem;
      font-size: 4rem;
      line-height: 1;
      opacity: 0.9;
    }

    .description {
      font-size: 0.78rem;
      color: var(--cool);
      text-transform: capitalize;
      letter-spacing: 0.06em;
      margin-top: 0.8rem;
    }

    /* Stats grid */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0;
    }

    .stat {
      padding: 1.1rem 1.4rem;
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }

    .stat:nth-child(3n) { border-right: none; }
    .stat:nth-last-child(-n+3) { border-bottom: none; }

    .stat-label {
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 0.4rem;
    }

    .stat-value {
      font-size: 1.05rem;
      font-weight: 500;
      color: var(--text);
    }

    .stat-unit {
      font-size: 0.65rem;
      color: var(--muted);
      margin-left: 2px;
    }

    /* Timestamp */
    .timestamp {
      text-align: center;
      font-size: 0.65rem;
      color: var(--muted);
      padding: 0.9rem;
      border-top: 1px solid var(--border);
      letter-spacing: 0.08em;
    }

    /* Hidden */
    .hidden { display: none !important; }

    /* Loader */
    .loader {
      width: 100%;
      max-width: 480px;
      text-align: center;
      padding: 3rem;
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.12em;
    }

    .loader::after {
      content: '';
      display: block;
      width: 28px; height: 28px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      margin: 1rem auto 0;
      animation: spin 0.8s linear infinite;
    }

    /* Key input area */
    .key-row {
      display: flex;
      gap: 0.5rem;
      width: 100%;
      max-width: 480px;
      margin-bottom: 1rem;
      animation: fadeDown 0.66s ease both;
    }

    .key-row input { font-size: 0.75rem; }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <header>
    <h1>Sk<em>i</em>es</h1>
    <p>Real-time weather lookup</p>
  </header>

  <!-- API Key row -->
  <div class="key-row">
    <input type="text" id="apiKeyInput" placeholder="Paste your OpenWeatherMap API key…"/>
    <button id="saveKeyBtn" onclick="saveKey()">Save Key</button>
  </div>

  <div class="setup-box" id="setupBox">
    <strong>First time?</strong> Get a free API key at
    <a href="https://openweathermap.org/api" target="_blank">openweathermap.org</a>,
    paste it above, then search any city. Your key is saved locally in your browser.
  </div>

  <!-- Search -->
  <div class="search-wrap">
    <input type="text" id="cityInput" placeholder="City name — e.g. Tokyo, Chennai…" onkeydown="if(event.key==='Enter') getWeather()"/>
    <button id="searchBtn" onclick="getWeather()">Search</button>
  </div>

  <!-- Loader -->
  <div class="loader hidden" id="loader">FETCHING</div>

  <!-- Error -->
  <div class="error-box hidden" id="errorBox"></div>

  <!-- Result card -->
  <div class="card hidden" id="card">
    <div class="card-hero">
      <div class="weather-icon" id="weatherIcon">🌤</div>
      <div class="city-name" id="cityDisplay">—</div>
      <div class="country" id="countryDisplay">—</div>
      <div class="temp-row">
        <div class="temp-main" id="tempDisplay">—°</div>
        <div class="temp-feels">Feels like <span id="feelsLike">—</span></div>
      </div>
      <div class="description" id="descDisplay">—</div>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="stat-label">Humidity</div>
        <div class="stat-value" id="humidity">—<span class="stat-unit">%</span></div>
      </div>
      <div class="stat">
        <div class="stat-label">Wind</div>
        <div class="stat-value" id="wind">—<span class="stat-unit">km/h</span></div>
      </div>
      <div class="stat">
        <div class="stat-label">Pressure</div>
        <div class="stat-value" id="pressure">—<span class="stat-unit">hPa</span></div>
      </div>
      <div class="stat">
        <div class="stat-label">Visibility</div>
        <div class="stat-value" id="visibility">—<span class="stat-unit">km</span></div>
      </div>
      <div class="stat">
        <div class="stat-label">Min</div>
        <div class="stat-value" id="tempMin">—°</div>
      </div>
      <div class="stat">
        <div class="stat-label">Max</div>
        <div class="stat-value" id="tempMax">—°</div>
      </div>
    </div>

    <div class="timestamp" id="timestamp">—</div>
  </div>

  <script>
    const STORAGE_KEY = 'owm_api_key';

    // Load saved key
    window.addEventListener('DOMContentLoaded', () => {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        document.getElementById('apiKeyInput').value = saved;
        document.getElementById('setupBox').classList.add('hidden');
      }
    });

    function saveKey() {
      const key = document.getElementById('apiKeyInput').value.trim();
      if (!key) return;
      localStorage.setItem(STORAGE_KEY, key);
      document.getElementById('setupBox').classList.add('hidden');
      showError('✓ Key saved. Now search a city!', true);
    }

    function getApiKey() {
      return document.getElementById('apiKeyInput').value.trim()
          || localStorage.getItem(STORAGE_KEY) || '';
    }

    function showError(msg, info = false) {
      const box = document.getElementById('errorBox');
      box.textContent = msg;
      box.style.color = info ? 'var(--cool)' : 'var(--danger)';
      box.style.borderColor = info ? '#1e3a5f' : '#7f1d1d';
      box.style.background = info ? '#0a1628' : '#1f0a0a';
      box.classList.remove('hidden');
      setTimeout(() => box.classList.add('hidden'), 3000);
    }

    const weatherEmoji = (id) => {
      if (id >= 200 && id < 300) return '⛈';
      if (id >= 300 && id < 400) return '🌦';
      if (id >= 500 && id < 600) return '🌧';
      if (id >= 600 && id < 700) return '❄️';
      if (id >= 700 && id < 800) return '🌫';
      if (id === 800) return '☀️';
      if (id === 801) return '🌤';
      if (id <= 804) return '☁️';
      return '🌡';
    };

    async function getWeather() {
      const city = document.getElementById('cityInput').value.trim();
      const apiKey = getApiKey();

      if (!apiKey) { showError('⚠ No API key — paste one above and click Save Key.'); return; }
      if (!city)   { showError('⚠ Enter a city name first.'); return; }

      document.getElementById('card').classList.add('hidden');
      document.getElementById('errorBox').classList.add('hidden');
      document.getElementById('loader').classList.remove('hidden');
      document.getElementById('searchBtn').disabled = true;

      try {
        const url = `https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(city)}&appid=${apiKey}&units=metric`;
        const res = await fetch(url);
        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.message || 'City not found.');
        }

        // Populate
        document.getElementById('cityDisplay').textContent   = data.name;
        document.getElementById('countryDisplay').textContent = data.sys.country;
        document.getElementById('tempDisplay').textContent   = Math.round(data.main.temp) + '°';
        document.getElementById('feelsLike').textContent     = Math.round(data.main.feels_like) + '°C';
        document.getElementById('descDisplay').textContent   = data.weather[0].description;
        document.getElementById('weatherIcon').textContent   = weatherEmoji(data.weather[0].id);
        document.getElementById('humidity').innerHTML        = data.main.humidity + '<span class="stat-unit">%</span>';
        document.getElementById('wind').innerHTML            = Math.round(data.wind.speed * 3.6) + '<span class="stat-unit">km/h</span>';
        document.getElementById('pressure').innerHTML        = data.main.pressure + '<span class="stat-unit">hPa</span>';
        document.getElementById('visibility').innerHTML      = (data.visibility / 1000).toFixed(1) + '<span class="stat-unit">km</span>';
        document.getElementById('tempMin').textContent       = Math.round(data.main.temp_min) + '°';
        document.getElementById('tempMax').textContent       = Math.round(data.main.temp_max) + '°';

        const ts = new Date(data.dt * 1000);
        document.getElementById('timestamp').textContent     = 'Updated ' + ts.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

        document.getElementById('card').classList.remove('hidden');
      } catch (err) {
        showError('✕ ' + err.message);
      } finally {
        document.getElementById('loader').classList.add('hidden');
        document.getElementById('searchBtn').disabled = false;
      }
    }
  </script>
</body>
</html>
